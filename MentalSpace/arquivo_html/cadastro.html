<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">  
    <link rel="stylesheet" href="../arquivo_css/cadastro.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastro - Mental Space</title>
</head>
<body style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class='container' style="max-width: 500px;">
        <div class='card border-0 shadow-lg p-4' style="border-radius: 25px;">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none"><h1 class="fw-bold" style="color: #5167b2;">Mental Space</h1></a>
                <p class="text-muted">Crie sua conta e comece sua jornada</p>
            </div>
            
            <div id='msgError' class="alert alert-danger d-none"></div>
            <div id='msgSuccess' class="alert alert-success d-none"></div>
            
            <form id="formCadastro">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nome Completo</label>
                    <input type="text" id="nome" class="form-control form-control-lg" placeholder="Seu nome" required style="border-radius: 12px; font-size: 1rem;">
                </div>
    
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email</label>
                    <input type="email" id="email" class="form-control form-control-lg" placeholder="email@exemplo.com" required style="border-radius: 12px; font-size: 1rem;">
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">Senha</label>
                        <div class="input-group">
                            <input type="password" id="senha" class="form-control" placeholder="••••••••" required style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
                            <span class="input-group-text bg-white" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; cursor: pointer;" id="btnVerSenha">
                                <i class="fa fa-eye text-muted"></i>
                            </span>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">Confirmar</label>
                        <input type="password" id="confirmSenha" class="form-control" placeholder="••••••••" required style="border-radius: 12px;">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">Nascimento</label>
                        <input type="date" id="data_nascimento" class="form-control" required style="border-radius: 12px;">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">Gênero</label>
                        <select id="genero" class="form-select" required style="border-radius: 12px;">
                            <option value="" disabled selected>Selecionar</option>
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                </div>
                
                <div class='d-grid mt-4'>
                    <button type="submit" class="btn btn-primary btn-lg text-white" style="background-color: #5167b2; border: none; border-radius: 12px; font-weight: 600;">Criar Conta</button>
                </div>
            </form>

            <div class='text-center mt-4'>
                <p class="text-muted small">Já tem uma conta? <a href="login.html" class="fw-bold" style="color: #5167b2; text-decoration: none;">Faça login!</a></p>
            </div>
        </div>
    </div>

    <script src="../arquivo_js/cadastro.js"></script>
    <script>
        const btnVerSenha = document.getElementById('btnVerSenha');
        const inputSenha = document.getElementById('senha');
        btnVerSenha.addEventListener('click', () => {
            const type = inputSenha.getAttribute('type') === 'password' ? 'text' : 'password';
            inputSenha.setAttribute('type', type);
            btnVerSenha.querySelector('i').classList.toggle('fa-eye');
            btnVerSenha.querySelector('i').classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
