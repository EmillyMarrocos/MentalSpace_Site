<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">  
    <link rel="stylesheet" href="../arquivo_css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Entrar - Mental Space</title>
</head>
<body style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class='container' style="max-width: 450px;">
        <div class='card border-0 shadow-lg p-4' style="border-radius: 25px;">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none"><h1 class="fw-bold" style="color: #5167b2;">Mental Space</h1></a>
                <p class="text-muted">Bem-vindo de volta!</p>
            </div>
            
            <div id='msgError' class="alert alert-danger d-none"></div>
            
            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email ou Usuário</label>
                    <input type="text" id="email" class="form-control form-control-lg" placeholder="seu@email.com" required style="border-radius: 12px; font-size: 1rem;">
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small fw-bold">Senha</label>
                        <a href="#" class="small text-decoration-none" style="color: #5167b2;">Esqueceu a senha?</a>
                    </div>
                    <div class="input-group">
                        <input type="password" id="senha" class="form-control" placeholder="••••••••" required style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
                        <span class="input-group-text bg-white" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; cursor: pointer;" id="btnVerSenha">
                            <i class="fa fa-eye text-muted"></i>
                        </span>
                    </div>
                </div>
                
                <div class='d-grid'>
                    <button type="submit" class="btn btn-primary btn-lg text-white" style="background-color: #5167b2; border: none; border-radius: 12px; font-weight: 600;">Entrar</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="small text-muted">Ou entre com</p>
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-outline-secondary border-0 shadow-sm" style="border-radius: 50%; width: 45px; height: 45px;"><i class="fab fa-google"></i></button>
                    <button class="btn btn-outline-secondary border-0 shadow-sm" style="border-radius: 50%; width: 45px; height: 45px;"><i class="fab fa-apple"></i></button>
                </div>
            </div>
            
            <hr class="my-4">
            
            <div class='text-center'>
                <p class="text-muted small">Não tem uma conta? <a href="cadastro.html" class="fw-bold" style="color: #5167b2; text-decoration: none;">Cadastre-se agora</a></p>
            </div>
        </div>
    </div>

    <script src="../arquivo_js/login.js"></script>
    <script>
        const btnVerSenha = document.getElementById('btnVerSenha');
        const inputSenha = document.getElementById('senha');
        btnVerSenha.addEventListener('click', () => {
            const type = inputSenha.getAttribute('type') === 'password' ? 'text' : 'password';
            inputSenha.setAttribute('type', type);
            btnVerSenha.querySelector('i').classList.toggle('fa-eye');
            btnVerSenha.querySelector('i').classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
